<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E15A82">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Gidget">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gidget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#E15A82; --brand-soft:#F6B6C8;
    --income:#0FA08F;   --income-bar:#4FD0BE;
    --bills:#5E76D8;    --bills-bar:#8FA6F2;
    --spending:#D98A2B; --spending-bar:#F2B45C;
    --setaside:#A65CCB; --setaside-bar:#CB97E6;
    --bg:#FFF5F2; --card:#FFFFFF; --field:#FCF2EF; --line:#F1E2DD;
    --red:#D6455F; --ink:#3A2730; --muted:#9C8288; --good:#0FA08F;
    --track:#F3E6EE; --chip:#E0F5F1; --neutral:#F7E8E3; --neg:#FFE1E7;
    --shadow:0 2px 10px rgba(150,80,100,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Nunito",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .amt,.bal{font-variant-numeric:tabular-nums}
  button{font:inherit;color:inherit;cursor:pointer}
  :focus-visible{outline:2px solid var(--brand); outline-offset:2px; border-radius:6px}

  .phone{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}
  #view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

  /* tab bar */
  .tabs{display:flex;border-top:1px solid var(--line);background:var(--card);padding-bottom:env(safe-area-inset-bottom)}
  .tab{flex:1;border:0;background:none;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.3px}
  .tab svg{width:22px;height:22px}
  .tab.active{color:var(--brand)}

  /* hero */
  .hero{position:relative;overflow:hidden;background:var(--brand);color:#fff;
    padding:calc(env(safe-area-inset-top) + 8px) 16px 18px}
  .hero::before{content:"";position:absolute;top:-55%;left:50%;transform:translateX(-50%);
    width:150%;height:170%;background:radial-gradient(closest-side,rgba(255,224,176,.6),rgba(255,224,176,0) 70%);pointer-events:none}
  .brandrow{text-align:center;margin-bottom:4px}
  .logo{font-family:"Pacifico",cursive;font-size:22px;color:#fff;text-shadow:0 1px 6px rgba(120,30,60,.25)}
  .nav{display:flex;align-items:center;gap:8px}
  .navbtn{flex:0 0 auto;border:0;background:rgba(255,255,255,.20);color:#fff;width:38px;height:38px;border-radius:12px;font-size:22px;line-height:1;display:grid;place-items:center}
  .navbtn:disabled{opacity:.4}
  .title{flex:1;border:0;background:none;color:#fff;text-align:center;padding:2px}
  .eyebrow{font-size:11px;letter-spacing:1.5px;opacity:.9;font-weight:700;text-transform:uppercase}
  .wl{font-size:17px;font-weight:800;margin-top:1px}
  .balwrap{text-align:center;margin-top:12px}
  .bal{font-size:36px;font-weight:800;letter-spacing:-.5px;margin-top:2px}
  .sub{font-size:12px;opacity:.92;margin-top:3px;font-weight:600}

  /* secondary headers */
  .bar2{position:sticky;top:0;z-index:5;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 14px) 18px 8px}
  .bar2 h2{margin:0;font-size:25px;font-weight:800}
  .iconbtn{border:0;background:var(--brand);color:#fff;width:36px;height:36px;border-radius:12px;font-size:20px;line-height:1;display:grid;place-items:center;box-shadow:var(--shadow)}

  .scroll{padding:14px}
  .pad{padding:8px 14px 14px}

  .card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
  .bar{display:flex;justify-content:space-between;align-items:center;color:var(--ink);padding:11px 16px;font-size:13px;font-weight:800;letter-spacing:1px}
  .bar span:first-child::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:rgba(58,39,48,.55);margin-right:9px;vertical-align:middle}
  .bar.income{background:var(--income-bar)} .bar.bills{background:var(--bills-bar)}
  .bar.spending{background:var(--spending-bar)} .bar.setaside{background:var(--setaside-bar)}
  .bar.gold{background:var(--brand-soft)}
  .bar.gold span:first-child::before{display:none}
  .rows{padding:2px 14px 6px}
  .row{display:flex;justify-content:space-between;align-items:center;width:100%;border:0;background:none;text-align:left;padding:11px 4px;border-bottom:1px solid var(--field);gap:10px;font-weight:600}
  .row:last-child{border-bottom:0}
  .row .plus{font-weight:800;margin-right:6px}
  .row.add{font-size:14px;font-weight:700;border-bottom:0}
  .irow{display:flex;align-items:center;border-bottom:1px solid var(--field)}
  .irow:last-child{border-bottom:0}
  .rowmain{display:flex;align-items:center;flex:1;min-width:0;border:0;background:none;text-align:left;padding:11px 4px;font-weight:600;color:var(--ink);font-family:inherit;font-size:16px}
  .rowmain .lbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .daytag{flex:0 0 auto;font-size:11px;font-weight:700;color:var(--muted);background:var(--field);border-radius:6px;padding:1px 6px;margin-right:8px}
  .rowamt{flex:0 0 auto;border:0;background:none;padding:11px 6px 11px 10px;font-weight:600;color:var(--ink);font-family:inherit;font-size:16px;font-variant-numeric:tabular-nums}
  .banner{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#FFF1D9;border:1px solid #F0D49A;border-radius:14px;padding:11px 8px 11px 14px;margin-bottom:12px;font-weight:600;font-size:14px;color:var(--ink)}
  .bannerbtns{display:flex;align-items:center;gap:4px;flex:0 0 auto}
  .bannerbtn{border:0;background:var(--brand);color:#fff;font-weight:700;padding:8px 12px;border-radius:10px;font-size:13px}
  .bannerx{border:0;background:none;color:var(--muted);font-size:20px;line-height:1;padding:4px 8px}
  .fldrow{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink);font-weight:600;margin-bottom:14px}
  .fldrow input{width:20px;height:20px;accent-color:var(--brand);flex:0 0 auto}
  .chip{font-size:11px;background:var(--chip);color:var(--income);padding:1px 8px;border-radius:999px;margin-left:6px;font-weight:700}
  .hint{color:var(--muted);font-size:13px;padding:12px 4px;line-height:1.5;font-weight:600}

  .summary{padding:16px}
  .srow{display:flex;justify-content:space-between;padding:3px 0;font-size:15px;font-weight:600}
  .rule{height:2px;background:var(--ink);opacity:.85;margin:9px 0;border-radius:2px}
  .total{font-weight:800;font-size:18px;padding:2px 0;border:0}
  .total .amt{font-size:18px;font-weight:800}
  .strong{font-weight:800}

  /* goals */
  .goal{padding:16px}
  .goalhead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .goalhead h3{margin:0;font-size:18px;font-weight:800}
  .goalbtns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .minibtn{border:1px solid var(--line);background:var(--field);border-radius:10px;padding:5px 10px;font-size:12px;font-weight:700}
  .minibtn.danger{color:var(--red);border-color:#F0CDD3}
  .bartrack{height:11px;border-radius:999px;background:var(--track);margin:13px 0 8px;overflow:hidden}
  .barfill{height:100%;background:var(--setaside);border-radius:999px;transition:width .3s ease}
  @media (prefers-reduced-motion:reduce){.barfill{transition:none}}
  .goalrow{display:flex;justify-content:space-between;align-items:center;font-weight:600}
  .dl{font-size:13px;margin-top:9px;display:flex;gap:6px;align-items:center;font-weight:700}
  .dl.good{color:var(--good)} .dl.bad{color:var(--red)} .dl.muted{color:var(--muted);font-weight:600}
  .small{font-size:12px} .muted{color:var(--muted)} .center{text-align:center}

  /* overview */
  .orow{display:flex;justify-content:space-between;align-items:center;padding:11px 4px;border-bottom:1px solid var(--field);font-weight:600}
  .orow:last-child{border-bottom:0}
  .oright{text-align:right}
  .pad-s{padding:12px 4px 4px;font-weight:800;letter-spacing:1px;font-size:11px}

  /* footer */
  .footer{display:flex;gap:8px;padding:4px 0 10px}
  .primary{flex:1;border:0;background:var(--brand);color:#fff;font-weight:800;padding:15px;border-radius:16px;font-size:16px;box-shadow:var(--shadow)}
  .primary.block{width:100%}
  .ghostbtn{border:0;background:var(--neutral);color:var(--ink);padding:15px 18px;border-radius:16px;font-weight:700}

  /* empty / start */
  .empty{display:flex;align-items:center;justify-content:center;min-height:72vh;padding:24px}
  .emptycard{max-width:350px;text-align:center;padding:30px 24px}
  .emptycard h1{font-size:22px;margin:0 0 8px;font-weight:800}
  .emptycard p{color:var(--muted);font-size:15px;line-height:1.55;margin:0 0 18px;font-weight:600}
  .sun{width:64px;height:64px;margin:0 auto 6px;color:var(--brand)}
  .biglogo{font-family:"Pacifico",cursive;font-size:46px;color:var(--brand);line-height:1.1;margin-bottom:6px}
  .tagline{color:var(--muted);font-size:15px;line-height:1.55;font-weight:600;margin:0 0 20px}
  .badge{width:60px;height:60px;border-radius:18px;background:var(--brand);display:grid;place-items:center;margin:0 auto 16px}
  .badge svg{width:30px;height:30px;color:#fff}
  .textbtn{border:0;background:none;color:var(--muted);font-size:14px;padding:8px;font-weight:700}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(58,28,40,.42);display:flex;align-items:flex-end;justify-content:center;z-index:50}
  @media (min-width:520px){.overlay{align-items:center}}
  .sheet{background:var(--card);width:100%;max-width:480px;border-radius:24px 24px 0 0;padding-bottom:calc(env(safe-area-inset-bottom) + 12px);animation:rise .18s ease}
  @media (min-width:520px){.sheet{border-radius:24px}}
  @media (prefers-reduced-motion:reduce){.sheet{animation:none}}
  @keyframes rise{from{transform:translateY(16px);opacity:.6}to{transform:none;opacity:1}}
  .sheethead{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--line)}
  .sheethead strong{font-size:16px;font-weight:800}
  .sheethead .save{color:var(--brand);font-weight:800}
  .sheetbody{padding:16px}
  .fld{display:block;font-size:13px;color:var(--muted);font-weight:700;margin-bottom:14px}
  .fld input,.fld select{display:block;width:100%;margin-top:6px;font-size:16px;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);font-family:inherit}
  .money{display:flex;align-items:center;gap:4px;margin-top:6px;border:1px solid var(--line);border-radius:12px;padding:0 12px;background:#fff}
  .money span{color:var(--muted)}
  .money input{border:0;padding:12px 0;font-size:16px;flex:1;background:none;font-family:inherit}
  .money input:focus{outline:none}
  .note{font-size:13px;color:var(--muted);line-height:1.5;margin:2px 0 0;font-weight:600}
  .delbtn{display:block;width:100%;margin-top:8px;border:0;background:#FCE7EB;color:var(--red);font-weight:800;padding:13px;border-radius:12px}
  .linkbtn{display:block;width:100%;margin-top:10px;border:0;background:none;color:var(--muted);font-size:14px;text-align:left;padding:6px 2px;font-weight:700}
  .bigbtn{display:block;width:100%;margin-top:8px;border:1px solid var(--line);background:var(--field);color:var(--ink);font-weight:700;padding:13px;border-radius:12px;text-align:left}
  .bigbtn:first-of-type{margin-top:0}
  .divider{height:1px;background:var(--line);margin:14px 0}
</style>
</head>
<body>
<div class="phone">
  <div id="view"></div>
  <nav class="tabs">
    <button class="tab" data-action="tab:budget" data-tabkey="budget">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
      Budget
    </button>
    <button class="tab" data-action="tab:goals" data-tabkey="goals">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>
      Goals
    </button>
    <button class="tab" data-action="tab:overview" data-tabkey="overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5M4 19h16M4 14l4-4 3 3 5-6"/></svg>
      Overview
    </button>
  </nav>
</div>

<script src="gidget.js"></script>
</body>
</html>
